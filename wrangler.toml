# wrangler.toml — Cloudflare Workers + Supabase 配置
name = "ta-assistant-api"
main = "src/workers/index.ts"
compatibility_date = "2026-01-01"

# ====== Supabase 配置 ======
# 数据库 + Storage + Auth 全部走 Supabase
# 本地开发通过 .dev.vars 配置（已加入 .gitignore）：
#   SUPABASE_URL=https://kholxtaprqpnqqcnsnre.supabase.co
#   SUPABASE_KEY=sb_publishable_xxx

# ====== 豆包（火山方舟）AI 配置 ======
# 部署后通过 wrangler secret 设置：
#   wrangler secret put DOUBAO_API_KEY
#   wrangler secret put DOUBAO_MODEL_ID
#
# 本地开发通过 .dev.vars 文件配置：
#   DOUBAO_API_KEY=你的API Key
#   DOUBAO_MODEL_ID=doubao-1-5-pro-32k

[vars]
DOUBAO_MODEL_ID = "doubao-1-5-pro-32k"
SUPABASE_URL = "https://kholxtaprqpnqqcnsnre.supabase.co"
SUPABASE_KEY = "sb_publishable_0avSGJjQo2gzMhyqB55XWA_8c2WxMOt"
